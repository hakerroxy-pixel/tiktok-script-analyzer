<div class="mt-4 border-t border-gray-700 pt-4">
    <form onsubmit="sendChatMessage(event, {{ adaptation.id }})" class="flex gap-2">
        <input type="text" id="chat-input-{{ adaptation.id }}" placeholder="Ej: Hazlo más corto, cambia el hook..."
               class="flex-1 bg-dark-900 border border-gray-600 rounded px-3 py-2 text-sm text-white placeholder-gray-500 focus:border-purple-500 focus:outline-none">
        <button type="submit" id="chat-btn-{{ adaptation.id }}" class="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2 rounded text-sm">Enviar</button>
    </form>
    <div id="chat-status-{{ adaptation.id }}" class="mt-2 text-sm text-gray-500"></div>
</div>
