{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-2xl font-bold mb-6">Analizar Video de TikTok</h1>

    <form id="analyze-form" class="mb-8">
        <div class="flex gap-3">
            <input type="text" id="tiktok-url" placeholder="Pega la URL del TikTok aquí..."
                   class="flex-1 bg-dark-800 border border-gray-600 rounded-lg px-4 py-3 text-white placeholder-gray-500 focus:border-purple-500 focus:outline-none text-lg">
            <button type="submit" id="submit-btn" class="bg-purple-600 hover:bg-purple-700 text-white px-8 py-3 rounded-lg font-medium text-lg">
                Analizar
            </button>
        </div>
    </form>

    <div id="loading" class="hidden">
        {% include "partials/loading.html" %}
    </div>

    <div id="result"></div>
</div>

<script>
document.getElementById('analyze-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const url = document.getElementById('tiktok-url').value.trim();
    if (!url) return;

    const btn = document.getElementById('submit-btn');
    const loading = document.getElementById('loading');
    const result = document.getElementById('result');
    const status = document.getElementById('loading-status');

    btn.disabled = true;
    btn.textContent = 'Procesando...';
    loading.classList.remove('hidden');
    result.innerHTML = '';

    const steps = ['Descargando audio...', 'Transcribiendo con Whisper...', 'Analizando con Claude...'];
    let step = 0;
    const interval = setInterval(() => {
        step = Math.min(step + 1, steps.length - 1);
        status.textContent = steps[step];
    }, 5000);

    try {
        const resp = await fetch('/api/transcribe', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({url: url})
        });

        if (!resp.ok) {
            const err = await resp.json();
            throw new Error(err.error || 'Error al procesar');
        }

        const data = await resp.json();
        window.location.href = `/history/${data.video_id}`;
    } catch (err) {
        result.innerHTML = `<div class="bg-red-900/50 border border-red-500 rounded-lg p-4 text-red-300">${err.message}</div>`;
    } finally {
        clearInterval(interval);
        loading.classList.add('hidden');
        btn.disabled = false;
        btn.textContent = 'Analizar';
    }
});
</script>
{% endblock %}
