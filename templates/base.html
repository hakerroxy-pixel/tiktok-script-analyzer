<!DOCTYPE html>
<html lang="es" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}TikTok Script Analyzer{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: { extend: { colors: { dark: { 800: '#1a1a2e', 900: '#0f0f23', 700: '#16213e' } } } }
        }
    </script>
</head>
<body class="bg-dark-900 text-gray-100 min-h-screen">
    <nav class="bg-dark-800 border-b border-gray-700 px-6 py-4">
        <div class="max-w-4xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-purple-400">TikTok Script Analyzer</a>
            <a href="/history" class="text-gray-400 hover:text-white">Historial</a>
        </div>
    </nav>
    <main class="max-w-4xl mx-auto px-6 py-8">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
